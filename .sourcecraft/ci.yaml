on:
  push: {}

tokens:
  SERVICE_CONNECTION:
    service_connection: default-service-connection
    scope: org

workflows:
  deploy-bot:
    tasks:
      - name: deploy
        cubes:
          - name: get-iam
            env:
              ID_TOKEN: ${{ tokens.SERVICE_CONNECTION.id_token }}
              YC_SA_ID: ${{ tokens.SERVICE_CONNECTION.service_account_id }}
              YC_FOLDER_ID: ${{ tokens.SERVICE_CONNECTION.folder_id }}
            image: cr.yandex/sourcecraft/yc-iam:latest

          - name: deploy-functions
            env:
              YC_FOLDER_ID: ${{ tokens.SERVICE_CONNECTION.folder_id }}
            image: ubuntu:22.04
            script:
              - |
                set -e
                apt-get update -qq && apt-get install -y -qq curl zip bash ca-certificates
                curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i /usr/local -n
                export PATH=/usr/local/bin:$PATH

                yc config set token $IAM_TOKEN
                yc config set folder-id $YC_FOLDER_ID

                zip -r /tmp/bot.zip . -x "venv/*" ".env" "__pycache__/*" "*.pyc" ".git/*"

                for FUNC in "tg-webhook:yc.webhook.handler" "yc-payment:yc.payment.handler" "yc-reminders:yc.reminders.handler" "yc-results:yc.results.handler"; do
                  NAME="${FUNC%%:*}"
                  ENTRY="${FUNC##*:}"
                  yc serverless function create --name $NAME --folder-id $YC_FOLDER_ID 2>/dev/null || true
                  yc serverless function version create \
                    --function-name $NAME \
                    --runtime python311 \
                    --entrypoint $ENTRY \
                    --memory 512m \
                    --execution-timeout 60s \
                    --source-path /tmp/bot.zip
                done
