on:
  push: {}

tokens:
  SERVICE_CONNECTION:
    service_connection: default-service-connection
    scope: org

workflows:
  deploy-bot:
    tasks:
      - name: deploy
        cubes:
          - name: deploy-functions
            env:
              ID_TOKEN: ${{ tokens.SERVICE_CONNECTION.id_token }}
              YC_FOLDER_ID: ${{ tokens.SERVICE_CONNECTION.folder_id }}
            image: ubuntu:22.04
            script:
              - |
                set -e
                apt-get update -qq && apt-get install -y -qq curl zip bash ca-certificates jq
                curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i /usr/local -n
                export PATH=/usr/local/bin:$PATH

                # Обмениваем ID-токен сервисного подключения на IAM-токен Яндекс Облака
                IAM_TOKEN=$(curl -s -X POST \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  -d "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
                  --data-urlencode "requested_token_type=urn:ietf:params:oauth:token-type:access_token" \
                  --data-urlencode "subject_token=$ID_TOKEN" \
                  --data-urlencode "subject_token_type=urn:ietf:params:oauth:token-type:id_token" \
                  https://auth.yandex.cloud/oauth/token | jq -r .access_token)

                if [ -z "$IAM_TOKEN" ] || [ "$IAM_TOKEN" = "null" ]; then
                  echo "ERROR: failed to obtain IAM token"
                  exit 1
                fi

                yc config set token $IAM_TOKEN
                yc config set folder-id $YC_FOLDER_ID

                zip -r /tmp/bot.zip . -x "venv/*" ".env" "__pycache__/*" "*.pyc" ".git/*"

                for FUNC in "tg-webhook:yc.webhook.handler" "yc-payment:yc.payment.handler" "yc-reminders:yc.reminders.handler" "yc-results:yc.results.handler"; do
                  NAME="${FUNC%%:*}"
                  ENTRY="${FUNC##*:}"
                  yc serverless function create --name $NAME --folder-id $YC_FOLDER_ID 2>/dev/null || true
                  yc serverless function version create \
                    --function-name $NAME \
                    --runtime python311 \
                    --entrypoint $ENTRY \
                    --memory 512m \
                    --execution-timeout 60s \
                    --source-path /tmp/bot.zip
                done
